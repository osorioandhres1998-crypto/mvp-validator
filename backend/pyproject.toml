[tool.black]
line-length = 90
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 90

[tool.ruff]
line-length = 90
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B"]
ignore = ["E501"]  # la longitud de línea la gestiona black

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*"]
